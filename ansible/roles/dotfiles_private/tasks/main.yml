- name: Check dotfiles-private exists
  ansible.builtin.stat:
    path: "{{ dotfiles_private_dir }}"
  register: dotfiles_private_stat

- name: Warn if dotfiles-private not cloned
  ansible.builtin.debug:
    msg: "dotfiles-private not found. Please clone manually: git clone git@github.com:rytkmt/dotfiles-private.git {{ dotfiles_private_dir }}"
  when: not dotfiles_private_stat.stat.exists

- name: Ensure parent directories exist
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - .claude

- name: Create symlinks
  ansible.builtin.file:
    src: "{{ dotfiles_private_dir }}/{{ item.src }}"
    dest: "{{ ansible_env.HOME }}/{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: claude/skills,  dest: .claude/skills }
    - { src: claude/rules,   dest: .claude/rules }