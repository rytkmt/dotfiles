- name: Install lua build dependencies
  become: true
  ansible.builtin.apt:
    name:
      - libreadline-dev
      - build-essential
    state: present

- name: Download lua 5.1.5
  ansible.builtin.get_url:
    url: http://www.lua.org/ftp/lua-5.1.5.tar.gz
    dest: /tmp/lua-5.1.5.tar.gz

- name: Build and install lua
  become: true
  ansible.builtin.shell: |
    cd /tmp && tar xzf lua-5.1.5.tar.gz
    cd lua-5.1.5 && make linux && make install
  args:
    creates: /usr/local/bin/lua

- name: Download luarocks
  ansible.builtin.get_url:
    url: https://luarocks.github.io/luarocks/releases/luarocks-3.11.1.tar.gz
    dest: /tmp/luarocks-3.11.1.tar.gz

- name: Build and install luarocks
  become: true
  ansible.builtin.shell: |
    cd /tmp && tar xzf luarocks-3.11.1.tar.gz
    cd luarocks-3.11.1 && ./configure && make && make install
  args:
    creates: /usr/local/bin/luarocks

- name: Install luacheck
  ansible.builtin.shell: |
    luarocks install --local luacheck
  args:
    creates: "{{ ansible_env.HOME }}/.luarocks/bin/luacheck"

- name: Install lanes
  ansible.builtin.shell: |
    luarocks install --local lanes
  args:
    creates: "{{ ansible_env.HOME }}/.luarocks/lib/lua/5.1/lanes/core.so"
